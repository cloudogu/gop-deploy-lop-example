apiVersion: k8s.cloudogu.com/v3
kind: Blueprint
metadata:
  labels:
    app.kubernetes.io/name: blueprint
  name: blueprint
spec:
  displayName: blueprint
  blueprint:
    dogus:
      - name: official/redmine # https://github.com/cloudogu/redmine/releases
        version: "6.1.1-3"
      # Mandatory
      - name: official/cas # https://github.com/cloudogu/cas/releases
        version: "7.2.7-7"
      - name: official/postfix # https://github.com/cloudogu/postfix/releases
        version: "3.10.7-4"
      - name: official/ldap # https://github.com/cloudogu/ldap/releases
        version: "2.6.8-6"
      # Dependencies
      - name: official/postgresql # https://github.com/cloudogu/postgresql/releases
        version: "14.20-2"
<#if config.content.variables.fqdn??>
    config:
      global:
        - key: fqdn
          value: "${config.content.variables.fqdn}"
</#if>
